<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Wallpaper Quotation</title>

    <!-- PWA Setup -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0b1e3d" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Noida Decor" />
    <link rel="apple-touch-icon" href="/img/logo.jpeg" />

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <header>
        <div class="brand">
            <div class="brand-logo" id="header-logo-wrap">
                <img src="/img/logo.jpeg" id="header-logo-img" alt="Logo"
                    onerror="this.style.display='none';document.getElementById('header-logo-fallback').style.display='flex'" />
                <span id="header-logo-fallback"
                    style="display:none;width:100%;height:100%;align-items:center;justify-content:center;font-size:18px;font-weight:700;">W</span>
            </div>
            <div>
                <div class="brand-name">Arya Wallpaper</div>
            </div>
        </div>
        <div class="header-date" id="today-date"></div>
    </header>

    <div class="page">

        <!-- Customer Info -->
        <div class="card">
            <div class="card-title">Customer Details</div>
            <div class="cust-grid">
                <div class="field-wrap">
                    <label>Customer Name</label>
                    <input type="text" id="cust-name" placeholder="Full name" oninput="scheduleAutoSave()" />
                </div>
                <div class="field-wrap">
                    <label>Phone Number</label>
                    <input type="text" id="cust-phone" placeholder="+91 00000 00000" oninput="scheduleAutoSave()" />
                </div>
                <div class="field-wrap">
                    <label>Address</label>
                    <input type="text" id="cust-address" placeholder="House no, Street, City" oninput="scheduleAutoSave()" />
                </div>
            </div>
        </div>

        <!-- Rooms -->
        <div id="rooms-wrap"></div>

        <button class="add-room-btn" onclick="addRoom()"><span class="room-btn-icon">+</span> Add New Room</button>

        <!-- Summary -->
        <div class="card">
            <div class="card-title">Bill Summary</div>
            <div id="summary-rooms"></div>
            <div class="summary-footer">
                <div class="summary-totals">
                    <div class="sum-row">
                        <span>Total Area</span>
                        <span id="grand-sqft">0.000 sq ft</span>
                    </div>
                    <div class="sum-row grand">
                        <span>Grand Total</span>
                        <span id="grand-total">Rs. 0.00</span>
                    </div>
                </div>
            </div>
            <div class="advance-summary-box">
                <div class="advance-field-row">
                    <label>Advance Paid</label>
                    <input type="number" id="advance-amount" placeholder="0.00" min="0" step="0.01"
                        oninput="updateBalance();scheduleAutoSave()" />
                </div>
                <div class="balance-row">
                    <div>
                        <div class="balance-label">Balance Due</div>
                        <div class="balance-note" id="balance-note"></div>
                    </div>
                    <div style="text-align:right;">
                        <div class="balance-val" id="balance-val">Rs. 0.00</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Actions -->
        <div class="action-row">
            <button class="btn btn-primary" onclick="saveQuote()">Save Quote</button>
            <button class="btn btn-outline" onclick="showBill()">Preview Bill</button>
            <button class="btn btn-ghost" onclick="clearAll()">Clear All</button>
        </div>

        <!-- History -->
        <div class="card" style="margin-top:12px;">
            <div class="card-title">Quote History</div>
            <div id="history-list">
                <p class="empty-msg">No saved quotes yet.</p>
            </div>
        </div>

    </div>

    <!-- Bill Modal -->
    <div id="bill-modal">
        <div class="modal-bg" onclick="closeBill()"></div>
        <div class="modal-box">
            <button class="modal-close" onclick="closeBill()" type="button">&times;</button>
            <div id="bill-content"></div>

            <div class="bill-action-row">
                <button class="btn btn-outline" type="button" onclick="printBill()">Download / Print</button>
                <button class="btn btn-primary" type="button" id="share-btn" onclick="shareBill()">Share</button>
            </div>

            <div id="share-fallback-menu" class="share-menu">
                <div class="share-option" onclick="shareWhatsApp()">📱 WhatsApp se Share</div>
                <div class="share-option" onclick="shareEmail()">✉️ Email se Share</div>
                <div class="share-option" onclick="downloadBillImage()">⬇️ Image Download Karein</div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="app.js"></script>

    <!-- Service Worker Register -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(() => console.log('SW registered'))
            .catch(e => console.log('SW error', e));
        });
      }
    </script>

</body>
</html>
